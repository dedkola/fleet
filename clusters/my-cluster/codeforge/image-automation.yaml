---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: codeforge
  namespace: flux-system
spec:
  image: ghcr.io/dedkola/codeforge
  interval: 1m0s
  secretRef:
    name: fleet-ghcr
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: codeforge
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: codeforge
  filterTags:
    pattern: "^\\d{14}-[a-f0-9]+$"
  policy:
    alphabetical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: codeforge
  namespace: flux-system
spec:
  interval: 1m0s
  sourceRef:
    kind: GitRepository
    name: codeforge
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: "chore: update codeforge image to {{range .Changed.Changes}}{{print .NewValue}}{{end}}"
    push:
      branch: main
  update:
    path: ./k8s
    strategy: Setters
